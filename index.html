<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <div id="startPage" class="">
    <div id="navBar"></div>
    <div id="gymCardContainer"></div>
    <div id="pokemonGrid"></div>
  </div>
  <div id="gymPage" class="hide">
    <div id="gymBanner"></div>
    <div id="gymStats">
      <div id="gymStatsScoreBoard"></div>
      <div id="gymStatsScatterPlot"></div>
      <div id="gymStatsSpiderChart"></div>
    </div>
  </div>

















































  <div id="pokemon-page">
    <header id="pokemon-page-header">
      <div id="header-contents-left">
        <div id="arrow-back"></div>
        <div id="pokemon-picture"></div>
        <div id="pokemon-name-and-labels">
          <h2 id="pokemon-name-label"></h2>
          <div id="labels-container">
            <div class="label" id="generation-label"></div>
          </div>
        </div>
      </div>
      <div id="header-contents-right">
        <div class="pokemon-points-and-placement seperator">
          <h2 id="pokemon-top-points">1333</h2>
          <p>Top points</p>
        </div>
        <div class="pokemon-points-and-placement seperator">
          <h2 id="pokemon-total-points">6380</h2>
          <p>Total points</p>
        </div>
        <div class="pokemon-points-and-placement">
          <h2 id="pokemon-top-placement">#2</h2>
          <p>Top placement</p>
        </div>
      </div>
    </header>
  </div>
  <script src="d3.v7.min.js"></script>
  <script src="dataset.js"></script>
  <script src="index.js"></script>
</body>

</html>
